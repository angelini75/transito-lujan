  - id: v_exruta5_simone
    nombre: "Ex Ruta Nacional 5 — tramo sur (semáforo Insausti + semáforo Simone)"
    tipologia: C
    descripcion: >
      Tramo de la Ex Ruta Nacional 5 con dos semáforos problemáticos confirmados:
      1. SEMÁFORO INSAUSTI × Ex Ruta Nacional 5 (ACLARACIÓN DEL RESIDENTE):
         No es "mano única al norte". Es un semáforo que alterna el paso entre:
         a) Los que vienen de la calle María Ferrari (del otro lado de la Ex Ruta 5)
            hacia Insausti (cruce transversal)
         b) Los que circulan por la Ex Ruta Nacional 5 en sentido normal
         Funciona de tipo "paso uno a la vez" — genera esperas discontinuas.
      2. SEMÁFORO PASCUAL SIMONE × Ex Ruta 5: muy lento, confirmado anteriormente.
    origen:
      desc: "Ex Ruta Nacional 5, norte del semáforo Insausti"
      lat: -34.58200
      lon: -59.11432
      osm_ref: "Proxy — ajustar con recorrido GPS"
    destino:
      desc: "Ex Ruta Nacional 5 × Pascual Simone (semáforo muy lento)"
      lat: -34.58739
      lon: -59.11432
      osm_ref: "Ex Ruta Nacional 5 × Intendente Pascual Simone (confirmado OSM)"
    semaforos_confirmados:
