        tipo: "paso_alternado — María Ferrari / Ex Ruta 5"
        nota: "alterna dos flujos transversales; no es mano única"
      - nombre: "Pascual Simone × Ex Ruta Nacional 5"
        tipo: "semáforo convencional"
        nota: "identificado como uno de los más lentos de la red"
    validado_residente: true

