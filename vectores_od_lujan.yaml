# ══════════════════════════════════════════════════════════════
# VECTORES ORIGEN-DESTINO — Luján, Buenos Aires
# Coordenadas: extraídas de OpenStreetMap via Overpass API (2026-04-19)
# Validación pendiente: marcadas con validado_residente: false
# Nombres OSM corregidos respecto a denominación local
# ══════════════════════════════════════════════════════════════
#
# LÓGICA DE DISEÑO:
# Cada vector mide el tiempo de viaje en un TRAMO ESPECÍFICO
# colocando O y D en los extremos del embudo/corredor,
# sin intersecciones mayores intermedias que ofrezcan
# alternativas equivalentes (para evitar que Google reutee).
#
# NOMBRES OSM → DENOMINACIÓN LOCAL:
#   "Avenida Humberto Primo"          = Humberto I
#   "Doctor Francisco Javier Muñiz"   = Dr. Muñiz / Av. España (tramo urbano)
#   "Intendente Pascual Simone"        = Pascual Simone
#   "1000 - Avenida Carlos Pellegrini" = Carlos Pellegrini / Constitución
#   "9 - Almirante Brown"             = Almirante Brown
#   "16 - Adolfo Alsina"              = Adolfo Alsina
#   "Avenida Fernández Beschtedt"     = Beschtedt
# ══════════════════════════════════════════════════════════════

vectores:

  # ════════════════════════════════════════
  # TIPOLOGÍA A — EMBUDOS FÍSICOS (PUENTES)
  # ════════════════════════════════════════

  - id: v_pte_brown
    nombre: "Puente Almirante Brown"
    tipologia: A
    descripcion: >
      Cruce del Río Luján por el Puente Almirante Brown. Cuello de botella
      estructural. Se mide el tiempo de cruce completo incluyendo el acceso.
    origen:
      desc: "Almirante Brown, lado este del río (antes del puente)"
      lat: -34.56050
      lon: -59.12200
      osm_ref: "Almirante Brown × Puente (acceso este)"
    destino:
      desc: "Almirante Brown, lado oeste — intersección con Av. NSra. de Luján"
      lat: -34.56055
      lon: -59.11992
      osm_ref: "Almirante Brown × Av. Nuestra Señora de Luján (confirmado OSM)"
    horario_critico: "07:30-08:30 y 17:00-19:00 días hábiles"
    static_dist_m: 350
    nota_local: "Puente sin semáforos pero acceso congestionado en picos"
    validado_residente: false

  - id: v_pte_brown_completo
    nombre: "Almirante Brown + Puente Almirante Brown (bypass completo)"
    tipologia: A
    descripcion: >
      El bypass sin semáforos más importante de la ciudad, compuesto por DOS tramos:
      1. Calle Almirante Brown (Constitución → 9 de Julio): sin semáforos
      2. Puente Almirante Brown (9 de Julio → lado norte del río): puente propiamente dicho
      El residente confirmó que son entidades distintas en OSM y en la realidad.
    origen:
      desc: "Almirante Brown × Constitución (inicio del bypass, acceso desde rotonda Ruta 7)"
      lat: -34.56912
      lon: -59.09471
      osm_ref: "Almirante Brown (residential) — extremo este (confirmado OSM)"
    waypoint_1:
      desc: "Almirante Brown × 9 de Julio (fin de la calle, inicio del puente)"
      lat: -34.56074
      lon: -59.11923
      osm_ref: "9 de Julio × Almirante Brown (confirmado OSM)"
    destino:
      desc: "Puente Almirante Brown — extremo norte (salida al otro lado del río)"
      lat: -34.55946
      lon: -59.12247
      osm_ref: "Puente Almirante Brown start node (confirmado OSM)"
    horario_critico: "07:30-08:30 y 17:00-19:00 días hábiles; fines de semana todo el día"
    nota_local: >
      Sin semáforos en todo el tramo. El friction_index base esperado es ~0.1.
      Si supera 0.3, hay congestión en el acceso al puente (cola en 9 de Julio).
      Este vector es el BENCHMARK de referencia: la ruta más fluida disponible.
    validado_residente: true

  - id: v_pte_simone
    nombre: "Pascual Simone — cruce Río + FFCC (doble barrera)"
    tipologia: A
    descripcion: >
      El tramo más crítico del bypass norte-sur: cruza primero el Río Luján
      y luego el paso a nivel del FC Sarmiento. Cuando la barrera baja,
      el tráfico queda atrapado entre ambas barreras naturales.
      MEDIR ESTE VECTOR ES PRIORITARIO: captura el peor escenario posible.
    origen:
      desc: "Pascual Simone × Ex Ruta Nacional 5 (semáforo muy lento)"
      lat: -34.58739
      lon: -59.11432
      osm_ref: "Intendente Pascual Simone × Ex Ruta Nacional 5 (confirmado OSM)"
    destino:
      desc: "José M. Pérez × Av. Fray Manuel de Torres (salida del bypass)"
      lat: -34.55803
      lon: -59.12956
      osm_ref: "Julio Argentino Roca × Fray Manuel de Torres (proxy — confirmar)"
    paso_a_nivel: true
    cruce_rio: true
    horario_critico: "07:30-08:30 días hábiles (coincide con FC Sarmiento)"
    nota_local: >
      Medir en días hábiles pico mañana. Si el tren pasa durante el muestreo,
      el friction_index se dispara a >3.0 — marcar esos registros con
      flag 'barrera_activa' para análisis separado.
    validado_residente: false


  # ════════════════════════════════════════
  # TIPOLOGÍA B — BARRERAS FERROVIARIAS
  # ════════════════════════════════════════

  - id: v_fc_casey
    nombre: "Lorenzo Casey × FC Sarmiento (barrera)"
    tipologia: B
    descripcion: >
      Paso a nivel del FC Sarmiento sobre Lorenzo Casey.
      En pico mañana la barrera genera colas que llegan a varias cuadras.
      Comportamiento documentado: ~30% de motos usa vereda hacia Puente Muñiz.
    origen:
      desc: "Lorenzo Casey, lado sur de las vías (antes de la barrera)"
      lat: -34.57821
      lon: -59.10656
      osm_ref: "FC Sarmiento level_crossing (nodo 2704653075 — confirmado OSM)"
    destino:
      desc: "Lorenzo Casey, lado norte de las vías (después de la barrera)"
      lat: -34.57613
      lon: -59.09979
      osm_ref: "FC Sarmiento level_crossing (nodo 2791297653 — proxy, confirmar)"
    horario_critico: "07:30-08:30 días hábiles"
    nota_local: >
      La barrera baja con mucha antelación al paso del tren.
      El tiempo de espera es uno de los mayores de la red.
    validado_residente: false

  - id: v_fc_constitucion
    nombre: "FFCC × área Constitución / Ruta 7"
    tipologia: B
    descripcion: >
      Cruce del FC Sarmiento en la zona de acceso sur (cerca de Constitución
      y el nudo con Ruta Provincial 7). Identificado en OSM.
    origen:
      desc: "Sur de las vías — zona acceso Ruta 7 / Constitución"
      lat: -34.57688
      lon: -59.08954
      osm_ref: "FC Sarmiento level_crossing (nodo 2791274010 — confirmado OSM)"
    destino:
      desc: "Norte de las vías — continuación hacia el centro"
      lat: -34.57432
      lon: -59.09098
      osm_ref: "Constitución × Mitre (confirmado OSM)"
    horario_critico: "a determinar por el residente"
    validado_residente: false


  # ════════════════════════════════════════
  # TIPOLOGÍA C — CORREDORES TRONCALES
  # ════════════════════════════════════════

  - id: v_heras_completo
    nombre: "Las Heras — corredor completo (bypass preferido)"
    tipologia: C
    descripcion: >
      El bypass más usado del centro. Corre desde Constitución (extremo este)
      hasta Padre Salvaire (extremo oeste). La calle NO tiene puente: termina
      en la intersección con Padre Salvaire. El Puente Almirante Brown es una
      estructura SEPARADA en otra calle (Almirante Brown).
      ÚNICO semáforo: Italia × Las Heras (simple, corto).
      NUEVO PROBLEMA: reductores de velocidad en Alvear, Lamadrid y J.M. Paz.
    origen:
      desc: "Las Heras × Avenida Constitución (extremo este)"
      lat: -34.57607
      lon: -59.08978
      osm_ref: "Constitución × Las Heras (confirmado OSM)"
    waypoint_semaforo:
      desc: "Las Heras × Italia (único semáforo del tramo)"
      lat: -34.56748
      lon: -59.11757
      osm_ref: "Italia × Las Heras (confirmado OSM)"
    waypoint_9julio:
      desc: "Las Heras × 9 de Julio"
      lat: -34.56632
      lon: -59.12163
      osm_ref: "9 de Julio × Las Heras (confirmado OSM)"
    destino:
      desc: "Las Heras × Padre Salvaire (extremo oeste — terminus de la calle)"
      lat: -34.56605
      lon: -59.12259
      osm_ref: "Las Heras × Padre Salvaire (CONFIRMADO OSM + RESIDENTE)"
    horario_critico: "07:30-08:30 y 17:00-18:30 días hábiles"
    nota_local: >
      CORRECCION VALIDADA: Las Heras termina en Padre Salvaire, sin puente.
      El vector mide el corredor completo de ~3km sin semáforos relevantes.
      Comparar friction_index con v_constitucion_norte (mismo tramo en paralelo).
    validado_residente: true

  - id: v_heras_lomadas
    nombre: "Las Heras — tramo con nuevas lomadas (Alvear–Paz)"
    tipologia: C
    descripcion: >
      Sub-tramo de Las Heras con los nuevos reductores de velocidad.
      Mide el impacto específico de las lomadas instaladas recientemente.
    origen:
      desc: "Las Heras × Alvear (reductor de velocidad)"
      lat: -34.57142
      lon: -59.10508
      osm_ref: "Las Heras × Alvear (confirmado OSM)"
    destino:
      desc: "Las Heras × José María Paz (reductor de velocidad)"
      lat: -34.57053
      lon: -59.10780
      osm_ref: "Las Heras × José María Paz (confirmado OSM)"
    nota_local: >
      Este tramo corto mide directamente el impacto de la nueva señalización.
      Si el friction_index es > 0.5, la lomada está generando más fricción de
      la esperada para la distancia (~300m).
    validado_residente: false

