  - id: v_almirante_brown_calle
    nombre: "Almirante Brown (calle) — tramo urbano sin semáforos"
    tipologia: C
    descripcion: >
      Solo el tramo de la CALLE Almirante Brown (sin el puente).
      Va desde Constitución (este) hasta 9 de Julio (oeste).
      El residente confirmó: sin semáforos en todo este tramo.
      Usado como bypass interno hacia el área de la Basílica.
    origen:
