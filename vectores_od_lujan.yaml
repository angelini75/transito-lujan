    nota_local: >
      Sin semáforos. Benchmark de referencia de la red.
      Si el friction_index > 0.2 en este vector, la red entera tiene problemas.
    validado_residente: true

  - id: v_basilical
    nombre: "Av. Nuestra Señora de Luján — eje turístico"
    tipologia: C
    descripcion: >
      El corredor basilical principal. DATO CLAVE CONFIRMADO POR RESIDENTE:
      en días hábiles normales NO tiene semáforos → fluye libremente.
      La congestión del fin de semana es puramente por VOLUMEN (turismo/peregrinos),
      no por señalización. Esto hace al vector muy sensible como indicador de
      presencia turística: si hay fricción en día hábil, es un evento especial.
    origen:
      desc: "Av. NSra. de Luján — extremo este (acceso desde Ruta 7 / zona entrada)"
      lat: -34.56055
      lon: -59.11992
      osm_ref: "Almirante Brown × Av. NSra. de Luján (referencia confirmada OSM)"
    destino:
      desc: "Av. NSra. de Luján frente a la Basílica"
      lat: null
      lon: null
      osm_ref: "PENDIENTE — confirmar coordenada exacta"
    muestreo_diferencial: true
    horario_critico_finde: "sábados y domingos 11:00-18:00"
    horario_critico_peregrinacion: "sábados de octubre desde 08:00 — marcar como outlier"
    nota_local: >
      INSIGHT CRÍTICO: la ausencia de semáforos en días hábiles confirma que
      el problema de esta arteria es puramente de capacidad en eventos de masa,
      no de infraestructura semafórica. La intervención adecuada es gestión
      de eventos (desvíos, horarios de corte), no más semáforos.
    validado_residente: true

  - id: v_bypass_simone_completo
    nombre: "Bypass norte-sur: Ex Ruta 5 → Fray Torres (vía Simone/Pérez)"
    tipologia: C
    descripcion: >
      El "atajo estratégico" completo de sur a norte sin pasar por el centro.
      Incluye el cruce más crítico de la ciudad (río + FFCC en Simone).
      Es la ruta que usa el conductor informado pero colapsa con la barrera.
    origen:
      desc: "Ex Ruta Nacional 5 × Pascual Simone (semáforo muy lento)"
      lat: -34.58739
      lon: -59.11432
      osm_ref: "Ex Ruta Nacional 5 × Intendente Pascual Simone (confirmado OSM)"
    destino:
