# ──────────────────────────────────────────
# SECCIÓN 2: LOMAS DE BURRO Y REDUCTORES
# ──────────────────────────────────────────
lomas_de_burro:
  # Completar con todos los que conocés
  # Si no sabés las coordenadas exactas, la calle y altura son suficientes

  - id: lb_001
    calle: "[COMPLETAR]"
    altura_o_entre: "[COMPLETAR: 'a 50m de la esquina con X' o 'entre A y B']"
    lat: null
    lon: null
    tipo: "[reductor de velocidad / loma de burro / paso elevado peatonal]"
    contexto: "[frente a escuela / hospital / semáforo / zona residencial]"
    efecto_trafico: "[descripción libre de cómo afecta el flujo]"

  # - id: lb_002
  # ...


# ──────────────────────────────────────────
# SECCIÓN 3: CONFLICTOS CONOCIDOS
# ──────────────────────────────────────────
conflictos_conocidos:
  # Intersecciones o tramos con problemas crónicos

  - id: cf_001
    interseccion: "[COMPLETAR: ej. 'San Martín y Humberto I']"
    tipo: "[semaforo_mal_calibrado / visibilidad_reducida / giro_conflictivo / paso_no_señalizado / otro]"
    descripcion: >
      [COMPLETAR: descripción narrativa de qué pasa exactamente.
      Incluir: tipo de vehículos involucrados, comportamiento observado,
      condiciones que lo agravan (lluvia, noche, hora pico)]
    horario_critico: "[COMPLETAR o null si es permanente]"
    dias: ["[COMPLETAR: lunes-viernes / fines de semana / todos]"]
    nivel_riesgo_estimado: "[alto / medio / bajo]"
    tipo_accidente_probable: "[moto-auto / auto-auto / atropello / otro]"

  # - id: cf_002
  # ...


# ──────────────────────────────────────────
# SECCIÓN 4: ANOMALÍAS DE CALENDARIO
# ──────────────────────────────────────────
anomalias_calendario:
  # Eventos que alteran el patrón normal de tránsito

  - evento: "Peregrinación a la Basílica"
    frecuencia: "[COMPLETAR: fechas aproximadas conocidas]"
    impacto: >
      [COMPLETAR: qué calles se cierran, cómo se redistribuye el tráfico,
      desde qué hora es crítico]
    vectores_afectados: ["[COMPLETAR: ids de vectores que se ven afectados]"]
    marcar_como_outlier: true

  - evento: "Inicio de clases / ciclo lectivo"
    frecuencia: "marzo / agosto"
    impacto: "[COMPLETAR]"
    vectores_afectados: []
    marcar_como_outlier: false

  - evento: "[COMPLETAR: otros eventos locales que conozcas]"
    frecuencia: null
    impacto: null
    vectores_afectados: []
    marcar_como_outlier: false


# ──────────────────────────────────────────
# SECCIÓN 5: PUNTOS DE VISIBILIDAD REDUCIDA
# ──────────────────────────────────────────
puntos_ciegos_visibilidad:
  # Lugares donde edificios, árboles, camiones estacionados
  # o diseño vial tapan la visión en esquinas o cruces

  - id: pv_001
    interseccion: "[COMPLETAR]"
    causa: "[árbol / edificio en esquina / camión estacionado permanente / otro]"
    descripcion: "[descripción libre]"
    riesgo_moto_auto: "[alto / medio / bajo]"


# ──────────────────────────────────────────
# SECCIÓN 6: CALLES SUBUTILIZADAS O ALTERNATIVAS
# ──────────────────────────────────────────
alternativas_desconocidas:
  # Calles paralelas que podrían absorber tráfico pero los conductores no usan
  # (porque están en mal estado, tienen muchas lomadas, son confusas, etc.)

  - calle: "[COMPLETAR]"
    razon_de_no_uso: "[estado / señalizacion / cultural / otra]"
    potencial_como_alternativa: "[alto / medio / bajo]"
    notas: "[descripción libre]"


# ──────────────────────────────────────────
# SECCIÓN 7: OBSERVACIONES GENERALES
# ──────────────────────────────────────────
observaciones_generales:
  comportamiento_moto: >
    [COMPLETAR: cómo se comportan las motos en general en Luján.
    Circulan por la derecha, suben a la vereda, esquivan barreras,
    zigzaguean entre filas, etc. Esto informa el modelo de riesgo.]

  horarios_pico_reales: >
    [COMPLETAR: según tu experiencia, cuáles son los horarios
    donde el tránsito es realmente crítico. Pueden diferir de los
    horarios "típicos" de otras ciudades.]

  impacto_lluvia: >
    [COMPLETAR: cómo cambia el tránsito cuando llueve.
    ¿Hay inundaciones en algún punto? ¿Calles que se vuelven intransitables?]

  cambios_recientes_sentido: >
    [COMPLETAR: cambios de sentido de circulación que se hayan
    hecho en los últimos 2-3 años. Especialmente los que generaron
    controversia o problemas.]

  otras_observaciones: >
    [Cualquier otra cosa que consideres relevante para entender
    el tránsito de Luján que no entre en las categorías anteriores]
